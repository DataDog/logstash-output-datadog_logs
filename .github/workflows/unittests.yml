---

name: Build and Test logstash-output-datadog_logs plugin

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      LOGSTASH_SOURCE: 1
      LOGSTASH_PATH: /usr/share/logstash
      # LOGSTASH_PATH: ${{ github.workspace }}/logstash
    steps:
      - name: Checkout logstash-output-datadog_logs
        uses: actions/checkout@v3

      - name: Install Logstash GPG-KEY
        run: curl -sS https://artifacts.elastic.co/GPG-KEY-elasticsearch | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/elasticsearch.gpg

      - name: Setup Logstash 9.x repo
        run: echo "deb https://artifacts.elastic.co/packages/9.x/apt stable main" | sudo tee -a /etc/apt/sources.list.d/elastic-8.x.list

      - name: Install Logstash
        run: sudo apt-get update && sudo apt-get install logstash

      - name: Setup Ruby
        run: |
          echo "/usr/share/logstash/vendor/jruby/bin" >> $GITHUB_PATH
          echo "/usr/share/logstash/jdk/bin" >> $GITHUB_PATH
          # Point JAVA_HOME at the JDK bundled with Logstash (currently 21).
          # JRuby (which is also bundled with Logstash and compiled against the
          # bundled JDK) honors JAVA_HOME; without this, the runner's default
          # Java 17 is used and fails to load org.jruby.Main (class file v65).
          echo "JAVA_HOME=/usr/share/logstash/jdk" >> $GITHUB_ENV

      - name: Run tests
        run: |
          sudo find /usr/share/logstash/vendor -type d -user root -exec sudo chown -R $USER: {} +
          gem install bundler
          # Bundler 4.x removed the `--with` flag. Use the local config form
          # (scoped to this checkout, not persisted) to enable the test+ci groups.
          bundle config set --local with 'test ci'
          bundle install
          bundle exec rake vendor
          bundle exec rspec

  test-logstash-tests:
    name: Test logstash
    strategy:
      matrix:
        logstash:
          - 7.17.8
          - 8.6.1
          - 9.2.2
      fail-fast: false
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v3

      - name: Build Gem
        run: gem build logstash-output-datadog_logs.gemspec

      - name: Install Logstash GPG-KEY
        run: curl -sS https://artifacts.elastic.co/GPG-KEY-elasticsearch | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/elasticsearch.gpg

      - name: Setup Logstash 7.x repo
        if: ${{ startsWith(matrix.logstash, '7') }}
        run: echo "deb https://artifacts.elastic.co/packages/7.x/apt stable main" | sudo tee -a /etc/apt/sources.list.d/elastic-7.x.list

      - name: Setup Logstash 8.x repo
        if: ${{ startsWith(matrix.logstash, '8') }}
        run: echo "deb https://artifacts.elastic.co/packages/8.x/apt stable main" | sudo tee -a /etc/apt/sources.list.d/elastic-8.x.list
      
      - name: Setup Logstash 9.x repo
        if: ${{ startsWith(matrix.logstash, '9') }}
        run: echo "deb https://artifacts.elastic.co/packages/9.x/apt stable main" | sudo tee -a /etc/apt/sources.list.d/elastic-9.x.list

      - name: Install Logstash
        run: sudo apt-get update && sudo apt-get install logstash=1:${{ matrix.logstash }}-1

      - name: Install Plugin
        run: sudo -E /usr/share/logstash/bin/logstash-plugin install logstash-output-datadog_logs-$(cat lib/logstash/outputs/version.rb| grep VERSION| cut -d"'" -f2).gem

      - name: Plugin configuration
        run: |
          echo ''                                  > /tmp/logfile.log
          echo 'input {'                           > /tmp/test.conf
          echo '  file {'                         >> /tmp/test.conf
          echo '    path => ["/tmp/logfile.log"]' >> /tmp/test.conf
          echo '  }'                              >> /tmp/test.conf
          echo '}'                                >> /tmp/test.conf
          echo 'output {'                         >> /tmp/test.conf
          echo '  datadog_logs {'                 >> /tmp/test.conf
          echo '    api_key => "XXX"'             >> /tmp/test.conf
          echo '  }'                              >> /tmp/test.conf
          echo '}'                                >> /tmp/test.conf

      - name: Run Logstash
        run: |
            sudo chown -R $USER: /usr/share/logstash
            sleep 20 && echo 'this is a log' >> /tmp/logfile.log&
            timeout 30s /usr/share/logstash/bin/logstash -r -f "/tmp/test.conf" 2>&1 | tee /tmp/logstash.log
            # Match either "API key is invalid" or "API key is missing" — Datadog
            # intake wording has varied over time; the assertion we actually care
            # about is that the plugin reached intake and got a 403.
            grep -qE 'datadoglogs - Unable to send payload due to client error: 403 .*"detail":"API key is (invalid|missing)"' /tmp/logstash.log